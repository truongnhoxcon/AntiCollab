server {
    listen 80;
    server_name localhost;

    # ── SPA routing ───────────────────────────────────────────────────────────
    # Serve the React app for every path.  The ALB listener rules that sit in
    # front of this container already handle /api/* and /ws/* routing:
    #
    #   /api/*  →  core-backend  target group  (priority 1)
    #   /ws/*   →  realtime-backend target group (priority 2)
    #   /*      →  this frontend target group   (default action)
    #
    # Because the ALB never forwards /api or /ws requests to this container,
    # there is no need for Nginx to reverse-proxy them.  Removing the upstream
    # proxy blocks eliminates the "host not found in upstream" crash that
    # occurred when Docker-Compose service names (backend-core, backend-realtime)
    # were referenced in an ECS/VPC environment where those names do not resolve.
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ── Local proxy fallback for docker-compose development ───────────────────
    # We use a resolver and a variable for the proxy_pass destination. This prevents
    # Nginx from attempting to resolve the 'backend-core' and 'backend-realtime'
    # hostnames at startup, ensuring that this container can boot successfully
    # in production ECS/VPC environments (where those hosts are not registered
    # in local DNS and requests are routed beforehand by ALB).
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_core_upstream http://backend-core:3000;
        proxy_pass $backend_core_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_realtime_upstream http://backend-realtime:4000;
        proxy_pass $backend_realtime_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        root /usr/share/nginx/html;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
